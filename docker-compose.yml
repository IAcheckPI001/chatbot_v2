services:
  redis:
    image: redis:7-alpine
    container_name: chatbot_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chatbot_backend
    restart: always
    depends_on:
      - redis
    environment:
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_PREFIX: chatbot_v1
    ports:
      - "8001:8000"